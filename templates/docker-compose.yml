# AGMind Docker Compose -- macOS (Generated by install.sh)
# No ollama, vllm, tei, or authelia services (macOS-specific)
# Image versions sourced from versions.env via env_file

services:
  # ===========================================================================
  # Dify API Server
  # ===========================================================================
  api:
    image: langgenius/dify-api:${DIFY_API_VERSION}
    restart: always
    env_file:
      - .env
      - versions.env
    environment:
      MODE: api
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dify_storage:/app/api/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Dify Celery Worker
  # ===========================================================================
  worker:
    image: langgenius/dify-api:${DIFY_API_VERSION}
    restart: always
    env_file:
      - .env
      - versions.env
    environment:
      MODE: worker
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dify_storage:/app/api/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================================================
  # Dify Celery Beat (periodic tasks)
  # ===========================================================================
  worker_beat:
    image: langgenius/dify-api:${DIFY_API_VERSION}
    restart: always
    env_file:
      - .env
      - versions.env
    environment:
      MODE: worker
      CELERY_BEAT: "true"
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dify_storage:/app/api/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================================================
  # Dify Web Frontend
  # ===========================================================================
  web:
    image: langgenius/dify-web:${DIFY_WEB_VERSION}
    restart: always
    env_file:
      - .env
      - versions.env
    environment:
      CONSOLE_API_URL: ""
      APP_API_URL: ""

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  db_postgres:
    image: postgres:${POSTGRES_VERSION}
    restart: always
    profiles:
      - postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # Redis
  # ===========================================================================
  redis:
    image: redis:${REDIS_VERSION}
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Dify Code Execution Sandbox
  # ===========================================================================
  sandbox:
    image: langgenius/dify-sandbox:${DIFY_SANDBOX_VERSION}
    restart: always
    env_file:
      - .env
      - versions.env
    environment:
      API_KEY: ${SANDBOX_API_KEY}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================================================
  # Dify Plugin Daemon
  # ===========================================================================
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:${DIFY_PLUGIN_DAEMON_VERSION}
    restart: always
    env_file:
      - .env
      - versions.env
    environment:
      DB_DATABASE: dify_plugin
      SERVER_PORT: 5002
      SERVER_KEY: ${PLUGIN_DAEMON_KEY}
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY}
      DIFY_INNER_API_URL: http://api:5001
      MAX_PLUGIN_PACKAGE_SIZE: 52428800
      PPROF_ENABLED: "false"
    depends_on:
      db_postgres:
        condition: service_healthy
    ports:
      - "5002:5002"
    volumes:
      - plugin_storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================================================
  # SSRF Proxy (Squid)
  # ===========================================================================
  ssrf_proxy:
    image: ubuntu/squid:${SQUID_VERSION}
    restart: always
    volumes:
      - "{{DOCKER_SOCKET_PATH}}:/var/run/docker.sock:ro"

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:${NGINX_VERSION}
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - open-webui

  # ===========================================================================
  # Open WebUI
  # ===========================================================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION}
    restart: always
    env_file:
      - .env
      - versions.env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
    volumes:
      - openwebui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================================================
  # Weaviate (Vector DB option -- profile-gated)
  # ===========================================================================
  weaviate:
    image: semitechnologies/weaviate:${WEAVIATE_VERSION}
    restart: always
    profiles:
      - weaviate
    environment:
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_AUTHENTICATION_APIKEY_ALLOWED_KEYS}
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: 25
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Qdrant (Vector DB option -- profile-gated)
  # ===========================================================================
  qdrant:
    image: langgenius/qdrant:${QDRANT_VERSION}
    restart: always
    profiles:
      - qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage

  # ===========================================================================
  # Unstructured ETL (extended mode -- profile-gated)
  # ===========================================================================
  unstructured:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest
    restart: always
    profiles:
      - etl-extended

  # ===========================================================================
  # Portainer (monitoring -- profile-gated)
  # ===========================================================================
  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    profiles:
      - monitoring
    ports:
      - "9000:9000"
    volumes:
      - "{{DOCKER_SOCKET_PATH}}:/var/run/docker.sock:ro"
      - portainer_data:/data

  # ===========================================================================
  # SurrealDB (Open Notebook database -- profile-gated)
  # ===========================================================================
  surrealdb:
    image: surrealdb/surrealdb:${SURREALDB_VERSION}
    restart: always
    profiles:
      - opennotebook
    command: start --log info --user root --pass ${SURREAL_PASSWORD} rocksdb:/mydata/mydatabase.db
    user: root
    volumes:
      - surrealdb_data:/mydata
    environment:
      SURREAL_EXPERIMENTAL_GRAPHQL: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Open Notebook (AI research notebook -- profile-gated)
  # ===========================================================================
  open-notebook:
    image: lfnovo/open_notebook:${OPEN_NOTEBOOK_VERSION}
    restart: always
    profiles:
      - opennotebook
    environment:
      OPEN_NOTEBOOK_ENCRYPTION_KEY: ${OPEN_NOTEBOOK_ENCRYPTION_KEY}
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: root
      SURREAL_PASSWORD: ${SURREAL_PASSWORD}
      SURREAL_NAMESPACE: open_notebook
      SURREAL_DATABASE: open_notebook
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - opennotebook_data:/app/data
    depends_on:
      surrealdb:
        condition: service_healthy

  # ===========================================================================
  # DB-GPT (AI database assistant -- profile-gated)
  # ===========================================================================
  dbgpt:
    image: eosphorosai/dbgpt-openai:${DBGPT_VERSION}
    restart: always
    profiles:
      - dbgpt
    command: "dbgpt start webserver --config /app/configs/dbgpt-proxy-ollama.toml"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dbgpt_data:/app/pilot/data
      - dbgpt_message:/app/pilot/message
      - ./dbgpt-proxy-ollama.toml:/app/configs/dbgpt-proxy-ollama.toml:ro

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  dify_storage:
  plugin_storage:
  weaviate_data:
  qdrant_data:
  openwebui_data:
  portainer_data:
  surrealdb_data:
  opennotebook_data:
  dbgpt_data:
  dbgpt_message:
